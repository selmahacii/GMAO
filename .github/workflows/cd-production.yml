name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build
        env:
          NODE_ENV: production

      - name: Run pre-deployment checks
        run: |
          echo "Running pre-deployment checks..."
          bun run lint
          bun run test:coverage

      - name: Create deployment record
        run: |
          echo "Creating deployment record for version ${{ env.VERSION }}..."
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"

      # In production, add actual deployment steps:
      # - Build Docker image
      # - Push to container registry
      # - Blue/green deployment
      # - Run database migrations
      # - Health checks
      # - Rollback on failure

      - name: Deploy announcement
        run: |
          echo "🚀 Deploying GMAO Pro ${{ env.VERSION }} to production..."
          echo "This deployment requires manual approval."

      - name: Post-deployment verification
        run: |
          echo "Running post-deployment verification..."
          # curl -f https://gmao-pro.com/api/health || exit 1
          echo "✅ Health check passed"

      - name: Notify success
        run: |
          echo "🎉 Production deployment completed successfully!"
          echo "Version: ${{ env.VERSION }}"
          echo "URL: https://gmao-pro.com"
